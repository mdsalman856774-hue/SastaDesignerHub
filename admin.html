<!DOCTYPE html>
<html lang="ur">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel – Sasta Designer Hub</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ===== ADMIN STYLES ===== */
    body { background: #f5f0ff; }

    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2d1b4e 0%, #4a0e8f 50%, #3b1470 100%);
    }

    .login-box {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 360px;
      margin: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    .login-logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 14px;
      border: 3px solid #e8d5f5;
    }

    .login-box h2 {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      color: #2d1b4e;
      margin-bottom: 4px;
    }

    .login-box .sub { font-size: 0.82rem; color: #999; margin-bottom: 24px; }

    .form-group { text-align: left; margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #444; margin-bottom: 5px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      border: 1.5px solid #e0d4f5;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.88rem;
      font-family: 'Poppins', sans-serif;
      outline: none;
      color: #1a1a2e;
      transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      border-color: #9b59d8;
      box-shadow: 0 0 0 3px rgba(155,89,216,0.12);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .btn-primary {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #4a0e8f, #2d1b4e);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; }

    .btn-secondary {
      width: 100%;
      padding: 11px;
      border: 1.5px solid #e0d4f5;
      border-radius: 12px;
      background: #fff;
      color: #555;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .btn-secondary:hover { background: #f5f0ff; }

    .error-msg { color: #e53e3e; font-size: 0.78rem; margin-top: 5px; }

    /* Admin dashboard */
    .admin-page { display: none; flex-direction: column; min-height: 100vh; }
    .admin-header {
      background: linear-gradient(135deg, #2d1b4e 0%, #4a0e8f 100%);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #fff;
    }
    .admin-header h1 { font-family: 'Cinzel', serif; font-size: 1.1rem; }
    .admin-header p { font-size: 0.7rem; color: #c9aff5; margin-top: 2px; }
    .admin-header-btns { display: flex; gap: 10px; }
    .header-btn {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-view { background: rgba(255,255,255,0.15); color: #fff; }
    .btn-view:hover { background: rgba(255,255,255,0.25); }
    .btn-logout { background: rgba(220,38,38,0.75); color: #fff; }
    .btn-logout:hover { background: rgba(220,38,38,0.9); }

    .admin-body { max-width: 1100px; margin: 0 auto; padding: 24px 16px; width: 100%; }

    .success-banner {
      background: #f0fff4;
      border: 1px solid #9ae6b4;
      color: #276749;
      padding: 11px 16px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
    }

    .admin-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .admin-toolbar h2 { font-size: 1.1rem; font-weight: 700; color: #1a1a2e; }

    .btn-add {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #4a0e8f, #2d1b4e);
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Add product form */
    .add-form-card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 4px 16px rgba(74,14,143,0.1);
      border: 1px solid #e8d5f5;
      display: none;
    }
    .add-form-card h3 { font-size: 1rem; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid .full { grid-column: 1 / -1; }

    .img-preview {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      border: 1.5px solid #e0d4f5;
      margin-top: 8px;
      display: none;
    }

    .form-actions { display: flex; gap: 10px; margin-top: 14px; }
    .form-actions .btn-save {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #4a0e8f, #2d1b4e);
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
    }
    .form-actions .btn-cancel {
      padding: 11px 20px;
      border: 1.5px solid #e0d4f5;
      border-radius: 12px;
      background: #fff;
      color: #666;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
    }

    /* Product cards in admin */
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }

    .admin-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(74,14,143,0.08);
      border: 1px solid rgba(200,180,240,0.3);
    }

    .admin-card img {
      width: 100%;
      height: 170px;
      object-fit: cover;
    }

    .admin-card-body { padding: 14px; }
    .admin-card-badge {
      display: inline-block;
      background: #f3e8ff;
      color: #6b21a8;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 50px;
      margin-bottom: 8px;
    }
    .admin-card-body h3 { font-size: 0.9rem; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
    .admin-card-body p { font-size: 0.77rem; color: #888; line-height: 1.4; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .admin-card-price { font-family: 'Cinzel', serif; font-weight: 700; color: #5b1fa0; font-size: 1rem; margin-bottom: 10px; }

    .card-actions { display: flex; gap: 8px; }
    .btn-edit {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #f3e8ff;
      color: #6b21a8;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
    }
    .btn-edit:hover { background: #e9d5ff; }
    .btn-delete {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #fff5f5;
      color: #c53030;
      font-size: 0.8rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
    }
    .btn-delete:hover { background: #fed7d7; }

    /* Edit inline form */
    .edit-form { padding: 14px; }
    .edit-form h3 { font-size: 0.9rem; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }

    @media (max-width: 540px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
    }
  </style>
</head>
<body>

  <!-- ===== LOGIN SCREEN ===== -->
  <div class="login-screen" id="login-screen">
    <div class="login-box">
      <img src="logo.jpeg" alt="Logo" class="login-logo" />
      <h2>Admin Panel</h2>
      <p class="sub">Sasta Designer Hub</p>

      <form id="login-form">
        <div class="form-group">
          <label>Admin Password</label>
          <input type="password" id="pwd-input" placeholder="Password daalo..." />
          <p class="error-msg" id="pwd-error"></p>
        </div>
        <button type="submit" class="btn-primary">Login Karein</button>
      </form>
      <a href="index.html" class="btn-secondary" style="display:block;text-align:center;padding:11px;border:1.5px solid #e0d4f5;border-radius:12px;color:#555;font-size:0.88rem;font-weight:600;margin-top:10px;text-decoration:none;">
        Website Par Wapas Jayen
      </a>
    </div>
  </div>

  <!-- ===== ADMIN DASHBOARD ===== -->
  <div class="admin-page" id="admin-page">
    <div class="admin-header">
      <div>
        <h1>Admin Panel</h1>
        <p>Sasta Designer Hub</p>
      </div>
      <div class="admin-header-btns">
        <a href="index.html" class="header-btn btn-view">&#128065; Website Dekhen</a>
        <button class="header-btn btn-logout" onclick="logout()">&#10148; Logout</button>
      </div>
    </div>

    <div class="admin-body">
      <div class="success-banner" id="success-banner"></div>

      <div class="admin-toolbar">
        <h2 id="product-count">Products</h2>
        <button class="btn-add" onclick="toggleAddForm()">&#43; Naya Product Add Karein</button>
      </div>

      <!-- Add Product Form -->
      <div class="add-form-card" id="add-form-card">
        <h3>Naya Product Add Karein</h3>
        <div class="form-grid">
          <div class="form-group full">
            <label>Product Ka Naam</label>
            <input type="text" id="add-name" placeholder="e.g. Classic White T-Shirt" />
          </div>
          <div class="form-group full">
            <label>Description</label>
            <textarea id="add-desc" placeholder="Product ki description likho..."></textarea>
          </div>
          <div class="form-group">
            <label>Price (Rs.)</label>
            <input type="number" id="add-price" placeholder="e.g. 599" />
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="add-cat">
              <option>T-Shirt</option>
              <option>Shirt</option>
              <option>Jeans</option>
            </select>
          </div>
          <div class="form-group full">
            <label>Image URL</label>
            <input type="url" id="add-img" placeholder="https://example.com/image.jpg" oninput="previewImg(this,'add-preview')" />
            <img id="add-preview" class="img-preview" alt="preview" />
          </div>
        </div>
        <div class="form-actions">
          <button class="btn-save" onclick="addProduct()">&#10003; Product Add Karein</button>
          <button class="btn-cancel" onclick="toggleAddForm()">&#10005; Cancel</button>
        </div>
      </div>

      <!-- Products Grid -->
      <div class="admin-grid" id="admin-grid"></div>
    </div>
  </div>

  <script>
    // =====================================================
    // ADMIN PASSWORD - Apna password yahan daalo
    // =====================================================
    const ADMIN_PASSWORD = "admin123";
    // =====================================================

    const DEFAULT_PRODUCTS = [
      { id:"1", name:"Classic White T-Shirt", description:"Premium cotton t-shirt with a comfortable fit. Perfect for casual wear.", price:299, imageUrl:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400&h=400&fit=crop", category:"T-Shirt" },
      { id:"2", name:"Graphic Print T-Shirt", description:"Stylish graphic t-shirt with unique design. 100% cotton, breathable fabric.", price:349, imageUrl:"https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?w=400&h=400&fit=crop", category:"T-Shirt" },
      { id:"3", name:"Formal Cotton Shirt", description:"Elegant formal shirt made from premium cotton. Suitable for office and events.", price:599, imageUrl:"https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=400&h=400&fit=crop", category:"Shirt" },
      { id:"4", name:"Casual Check Shirt", description:"Trendy check pattern casual shirt. Versatile and comfortable for daily use.", price:499, imageUrl:"https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=400&h=400&fit=crop", category:"Shirt" },
      { id:"5", name:"Slim Fit Jeans", description:"Modern slim fit jeans with stretch fabric. Comfortable and stylish.", price:799, imageUrl:"https://images.unsplash.com/photo-1542272604-787c3835535d?w=400&h=400&fit=crop", category:"Jeans" },
      { id:"6", name:"Regular Fit Denim", description:"Classic regular fit denim jeans. Durable and perfect for all occasions.", price:699, imageUrl:"https://images.unsplash.com/photo-1604176354204-9268737828e4?w=400&h=400&fit=crop", category:"Jeans" },
    ];

    function getProducts() {
      const s = localStorage.getItem("sdh_products");
      if (s) return JSON.parse(s);
      localStorage.setItem("sdh_products", JSON.stringify(DEFAULT_PRODUCTS));
      return DEFAULT_PRODUCTS;
    }
    function saveProducts(arr) { localStorage.setItem("sdh_products", JSON.stringify(arr)); }

    // Login
    const session = sessionStorage.getItem("sdh_admin");
    if (session === "yes") showDashboard();

    document.getElementById("login-form").addEventListener("submit", function(e) {
      e.preventDefault();
      const pwd = document.getElementById("pwd-input").value;
      if (pwd === ADMIN_PASSWORD) {
        sessionStorage.setItem("sdh_admin", "yes");
        showDashboard();
      } else {
        document.getElementById("pwd-error").textContent = "Galat password! Dobara try karein.";
      }
    });

    function showDashboard() {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("admin-page").style.display = "flex";
      renderAdminGrid();
    }

    function logout() {
      sessionStorage.removeItem("sdh_admin");
      window.location.href = "index.html";
    }

    function showSuccess(msg) {
      const el = document.getElementById("success-banner");
      el.textContent = msg;
      el.style.display = "block";
      setTimeout(() => { el.style.display = "none"; }, 2500);
    }

    function renderAdminGrid() {
      const products = getProducts();
      document.getElementById("product-count").textContent = `Products (${products.length})`;
      const grid = document.getElementById("admin-grid");
      grid.innerHTML = products.map(p => `
        <div class="admin-card" id="card-${p.id}">
          <img src="${p.imageUrl}" alt="${p.name}" onerror="this.src='https://placehold.co/400x170/e8d5f5/6b21a8?text=No+Image'" />
          <div class="admin-card-body">
            <span class="admin-card-badge">${p.category}</span>
            <h3>${p.name}</h3>
            <p>${p.description}</p>
            <div class="admin-card-price">Rs. ${Number(p.price).toLocaleString()}</div>
            <div class="card-actions">
              <button class="btn-edit" onclick="startEdit('${p.id}')">&#9998; Edit</button>
              <button class="btn-delete" onclick="deleteProduct('${p.id}')">&#128465; Delete</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    function startEdit(id) {
      const products = getProducts();
      const p = products.find(x => x.id === id);
      if (!p) return;
      const card = document.getElementById("card-" + id);
      card.innerHTML = `
        <div class="edit-form">
          <h3>Product Edit Karein</h3>
          <div class="form-group">
            <label>Product Ka Naam</label>
            <input type="text" id="edit-name-${id}" value="${p.name}" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="edit-desc-${id}">${p.description}</textarea>
          </div>
          <div class="form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div class="form-group">
              <label>Price (Rs.)</label>
              <input type="number" id="edit-price-${id}" value="${p.price}" />
            </div>
            <div class="form-group">
              <label>Category</label>
              <select id="edit-cat-${id}">
                <option ${p.category==='T-Shirt'?'selected':''}>T-Shirt</option>
                <option ${p.category==='Shirt'?'selected':''}>Shirt</option>
                <option ${p.category==='Jeans'?'selected':''}>Jeans</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Image URL</label>
            <input type="url" id="edit-img-${id}" value="${p.imageUrl}" oninput="previewImg(this,'edit-preview-${id}')" />
            <img id="edit-preview-${id}" class="img-preview" src="${p.imageUrl}" style="display:block" alt="preview" />
          </div>
          <div class="form-actions">
            <button class="btn-save" onclick="saveEdit('${id}')">&#10003; Save Karein</button>
            <button class="btn-cancel" onclick="renderAdminGrid()">&#10005; Cancel</button>
          </div>
        </div>
      `;
    }

    function saveEdit(id) {
      const products = getProducts();
      const idx = products.findIndex(x => x.id === id);
      if (idx === -1) return;
      products[idx] = {
        id,
        name: document.getElementById("edit-name-" + id).value,
        description: document.getElementById("edit-desc-" + id).value,
        price: Number(document.getElementById("edit-price-" + id).value),
        category: document.getElementById("edit-cat-" + id).value,
        imageUrl: document.getElementById("edit-img-" + id).value,
      };
      saveProducts(products);
      renderAdminGrid();
      showSuccess("Product update ho gaya!");
    }

    function deleteProduct(id) {
      if (!confirm("Kya aap sach mein is product ko delete karna chahte hain?")) return;
      const products = getProducts().filter(x => x.id !== id);
      saveProducts(products);
      renderAdminGrid();
      showSuccess("Product delete ho gaya!");
    }

    let addFormVisible = false;
    function toggleAddForm() {
      addFormVisible = !addFormVisible;
      document.getElementById("add-form-card").style.display = addFormVisible ? "block" : "none";
    }

    function addProduct() {
      const name = document.getElementById("add-name").value.trim();
      const desc = document.getElementById("add-desc").value.trim();
      const price = document.getElementById("add-price").value;
      const cat = document.getElementById("add-cat").value;
      const img = document.getElementById("add-img").value.trim();
      if (!name || !price || !img) { alert("Kripya naam, price aur image URL zaroor bharo!"); return; }
      const products = getProducts();
      products.push({ id: Date.now().toString(), name, description: desc, price: Number(price), category: cat, imageUrl: img });
      saveProducts(products);
      document.getElementById("add-name").value = "";
      document.getElementById("add-desc").value = "";
      document.getElementById("add-price").value = "";
      document.getElementById("add-img").value = "";
      document.getElementById("add-preview").style.display = "none";
      toggleAddForm();
      renderAdminGrid();
      showSuccess("Naya product add ho gaya!");
    }

    function previewImg(input, previewId) {
      const img = document.getElementById(previewId);
      if (input.value) { img.src = input.value; img.style.display = "block"; }
      else { img.style.display = "none"; }
    }
  </script>
</body>
</html>
